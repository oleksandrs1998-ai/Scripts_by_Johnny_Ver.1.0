<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Scripts by Johnny</title>
</head>

<body>
<div class="background_window" id="back_ground_window">
    <textarea class="window" id="field4_main"></textarea>


<input class="field1_customer_name" type="text" id="field1_customer_name">
<input class="field2_days_left" type="text" placeholder ="Or date" id="field2_days_left">
<input class="field3_trailer_number" type="text" placeholder="Trailer number" id="field3_trailer_number">


<button class="button_generate" type="button" id="button_generate">GENERATE</button>
<button class="button_clear" type="button" id="button_clear">CLEAR</button>

<input class="q_inspection_box" type="checkbox" id="q_inspection_box">
<input class="q_inspection_detailed_box" type="checkbox" id="q_inspection_detailed_box">
<input class="spds_box_qi" type="checkbox" id="spds_box_qi">

<input class="pre_trip_general_box" type="checkbox" id="pre_trip_general_box">
<input class="pre_trip_reminder_box" type="checkbox" id="pre_trip_reminder_box">
<input class="pre_trip_trailer_box" type="checkbox" id="pre_trip_trailer_box">
<input class="spds_pre_trip_box" type="checkbox" id="spds_pre_trip_box">

<input class="welcome_box" type="checkbox" id="welcome_box">


<h2 class="customer_name_text">Customer name</h2>
<h2 class="q_inspection_text">QI</h2>
<h2 class="days_left_to_qi_text">Days:</h2>
<h2 class="q_inspection_detailed_text">QI(d)</h2>
<h2 class="spds_due_to_qi_text">SPDS(QI)</h2>

<h2 class="pre_trip_general_info">Pre-trip(General Info)</h2>
<h2 class="pre_trip_reminder_overall_text">Pre-trip(Remainder)</h2>
<h2 class="pre_trip_reminder_trailer_text">Pre-trip(R.-er trailer)</h2>
<h2 class="spds_due_to_pre_trip_text">SPDS(Pre-trip)</h2>

<h2 class="first_call_text">First call (SMS)</h2>
</div>
<script src="script.js"></script>
</body>
</html>
